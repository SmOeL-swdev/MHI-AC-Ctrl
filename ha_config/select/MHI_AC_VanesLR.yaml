# MHI-AC Horizontal Vanes (Left/Right) select entity (REFERENCE ONLY)
#
# NOTE: When USE_HA_DISCOVERY is enabled (default), VanesLR is included in the
# auto-discovered climate entity as swing_horizontal_modes. This file is NOT needed.
# Remove from your mqtt/select/ folder to avoid duplicate entities.
#
# Requires USE_EXTENDED_FRAME_SIZE enabled in firmware support.h
- name: "MHI-AC Vanes LR"
  unique_id: "MHI_VanesLR"
  state_topic: "MHI-AC/VanesLR"
  command_topic: "MHI-AC/set/VanesLR"
  options:
    - "1"
    - "2"
    - "3"
    - "4"
    - "5"
    - "6"
    - "7"
    - "Swing"
  icon: "mdi:swap-horizontal"

# MHI-AC 3D Auto mode switch entity (REFERENCE ONLY)
#
# NOTE: When USE_HA_DISCOVERY is enabled (default), 3D Auto is auto-discovered
# as a switch entity. This file is NOT needed.
# Remove from your mqtt/switch/ folder to avoid duplicate entities.
#
# Requires USE_EXTENDED_FRAME_SIZE enabled in firmware support.h
- name: "MHI-AC 3D Auto"
  unique_id: "MHI_3Dauto"
  state_topic: "MHI-AC/3Dauto"
  command_topic: "MHI-AC/set/3Dauto"
  payload_on: "On"
  payload_off: "Off"
  icon: "mdi:rotate-3d-variant"
